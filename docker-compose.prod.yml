# Production deployment with Nginx reverse proxy
version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: always

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/shorts_fission.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost,http://127.0.0.1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./luts:/app/luts
      - ./masks:/app/masks
      - ./sports_bgm:/app/sports_bgm
    depends_on:
      - redis
    restart: always

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_tasks worker --loglevel=info
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/shorts_fission.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./luts:/app/luts
      - ./masks:/app/masks
      - ./sports_bgm:/app/sports_bgm
    depends_on:
      - redis
    restart: always

  # Redis
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: always
    # Security: Only expose to internal network
    command: redis-server --bind 0.0.0.0 --protected-mode yes

volumes:
  redis_data:

networks:
  default:
    driver: bridge
